<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>翠翠的奇妙世界</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
        }

        h1 {
            color: #fff;
            margin: 20px 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        /* 舞台区域 */
        .stage {
            width: 100%;
            max-width: 600px;
            height: 400px;
            position: relative;
            background: linear-gradient(to bottom, #87CEEB 0%, #E0F6FF 50%, #90EE90 50%, #228B22 100%);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            overflow: hidden;
            margin-bottom: 30px;
        }

        /* 云朵装饰 */
        .cloud {
            position: absolute;
            background: white;
            border-radius: 50px;
            opacity: 0.8;
        }

        .cloud::before, .cloud::after {
            content: '';
            position: absolute;
            background: white;
            border-radius: 50%;
        }

        .cloud1 {
            width: 80px;
            height: 40px;
            top: 30px;
            left: 50px;
            animation: float 8s ease-in-out infinite;
        }

        .cloud1::before { width: 40px; height: 40px; top: -20px; left: 10px; }
        .cloud1::after { width: 50px; height: 50px; top: -25px; right: 10px; }

        .cloud2 {
            width: 100px;
            height: 50px;
            top: 50px;
            right: 80px;
            animation: float 10s ease-in-out infinite;
        }

        .cloud2::before { width: 50px; height: 50px; top: -25px; left: 15px; }
        .cloud2::after { width: 60px; height: 60px; top: -30px; right: 15px; }

        @keyframes float {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(30px); }
        }

        /* 翠翠人物容器 */
        .cuicui {
            position: absolute;
            left: 50%;
            bottom: 80px;
            transform: translateX(-50%);
            width: 120px;
            height: 200px;
            transition: all 0.3s ease;
        }

        /* 头部 - 使用图片 */
        .head {
            width: 100px;
            height: 100px;
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
        }

        .head img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #FFD700;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        /* 身体 */
        .body {
            width: 60px;
            height: 70px;
            background: linear-gradient(135deg, #FF6B6B 0%, #EE5A6F 100%);
            position: absolute;
            top: 85px;
            left: 50%;
            transform: translateX(-50%);
            border-radius: 15px;
            z-index: 5;
        }

        /* 手臂 */
        .arm {
            width: 20px;
            height: 50px;
            background: linear-gradient(135deg, #FF6B6B 0%, #EE5A6F 100%);
            position: absolute;
            top: 90px;
            border-radius: 10px;
            transform-origin: top center;
            z-index: 4;
        }

        .arm.left {
            left: 15px;
            transform: rotate(20deg);
        }

        .arm.right {
            right: 15px;
            transform: rotate(-20deg);
        }

        /* 腿 */
        .leg {
            width: 22px;
            height: 55px;
            background: linear-gradient(135deg, #4ECDC4 0%, #44A08D 100%);
            position: absolute;
            top: 145px;
            border-radius: 10px;
            transform-origin: top center;
            z-index: 4;
        }

        .leg.left {
            left: 35px;
        }

        .leg.right {
            right: 35px;
        }

        /* 表情气泡 */
        .bubble {
            position: absolute;
            top: -50px;
            right: -60px;
            background: white;
            padding: 10px 15px;
            border-radius: 20px;
            font-size: 24px;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        .bubble.show {
            opacity: 1;
        }

        .bubble::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 20px;
            border: 10px solid transparent;
            border-top-color: white;
        }

        /* ========== 动作动画 ========== */

        /* 1. 翻跟头 */
        .cuicui.somersault {
            animation: somersault 1.5s ease-in-out;
        }

        @keyframes somersault {
            0% { transform: translateX(-50%) rotate(0deg); }
            25% { transform: translateX(-50%) translateY(-30px) rotate(-90deg); }
            50% { transform: translateX(-50%) translateY(-50px) rotate(-180deg); }
            75% { transform: translateX(-50%) translateY(-30px) rotate(-270deg); }
            100% { transform: translateX(-50%) rotate(-360deg); }
        }

        /* 2. 俯卧撑 */
        .cuicui.pushup {
            animation: pushup 2s ease-in-out infinite;
        }

        @keyframes pushup {
            0%, 100% {
                transform: translateX(-50%) rotate(90deg) translateY(0);
            }
            50% {
                transform: translateX(-50%) rotate(90deg) translateY(-20px);
            }
        }

        .cuicui.pushup .arm.left {
            animation: pushupArm 2s ease-in-out infinite;
        }

        .cuicui.pushup .arm.right {
            animation: pushupArm 2s ease-in-out infinite;
        }

        @keyframes pushupArm {
            0%, 100% { transform: rotate(20deg); }
            50% { transform: rotate(60deg); }
        }

        /* 3. 蹦高高 */
        .cuicui.jump {
            animation: jump 0.8s ease-in-out infinite;
        }

        @keyframes jump {
            0%, 100% {
                transform: translateX(-50%) translateY(0) scaleY(1);
            }
            10% {
                transform: translateX(-50%) translateY(10px) scaleY(0.8);
            }
            40% {
                transform: translateX(-50%) translateY(-120px) scaleY(1.1);
            }
            60% {
                transform: translateX(-50%) translateY(-120px) scaleY(1.1);
            }
            90% {
                transform: translateX(-50%) translateY(10px) scaleY(0.8);
            }
        }

        .cuicui.jump .leg.left {
            animation: jumpLeg 0.8s ease-in-out infinite;
        }

        .cuicui.jump .leg.right {
            animation: jumpLeg 0.8s ease-in-out infinite;
        }

        @keyframes jumpLeg {
            0%, 100% { transform: rotate(0deg); }
            40%, 60% { transform: rotate(-20deg); }
        }

        .cuicui.jump .arm.left,
        .cuicui.jump .arm.right {
            animation: jumpArm 0.8s ease-in-out infinite;
        }

        @keyframes jumpArm {
            0%, 100% { transform: rotate(0deg); }
            40%, 60% { transform: rotate(-40deg); }
        }

        /* 4. 蹲下 */
        .cuicui.squat {
            animation: squat 0.5s ease forwards;
        }

        @keyframes squat {
            0% { transform: translateX(-50%) scaleY(1); }
            100% { transform: translateX(-50%) scaleY(0.7) translateY(30px); }
        }

        .cuicui.squat .leg.left,
        .cuicui.squat .leg.right {
            height: 35px;
            top: 160px;
        }

        .cuicui.squat .arm.left {
            transform: rotate(60deg);
        }

        .cuicui.squat .arm.right {
            transform: rotate(-60deg);
        }

        /* 5. 委屈 */
        .cuicui.sad {
            animation: sad 2s ease-in-out infinite;
        }

        @keyframes sad {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(5px); }
        }

        .cuicui.sad .head {
            animation: sadHead 2s ease-in-out infinite;
        }

        @keyframes sadHead {
            0%, 100% { transform: translateX(-50%) rotate(0deg); }
            50% { transform: translateX(-50%) rotate(-10deg); }
        }

        .cuicui.sad .arm.left {
            transform: rotate(40deg);
        }

        .cuicui.sad .arm.right {
            transform: rotate(-40deg);
        }

        /* 6. 开心 */
        .cuicui.happy {
            animation: happy 0.6s ease-in-out infinite;
        }

        @keyframes happy {
            0%, 100% { transform: translateX(-50%) scale(1); }
            50% { transform: translateX(-50%) scale(1.1) translateY(-10px); }
        }

        .cuicui.happy .arm.left {
            animation: happyArmLeft 0.6s ease-in-out infinite;
        }

        .cuicui.happy .arm.right {
            animation: happyArmRight 0.6s ease-in-out infinite;
        }

        @keyframes happyArmLeft {
            0%, 100% { transform: rotate(20deg); }
            50% { transform: rotate(-30deg); }
        }

        @keyframes happyArmRight {
            0%, 100% { transform: rotate(-20deg); }
            50% { transform: rotate(30deg); }
        }

        /* 7. 狂奔 */
        .cuicui.run {
            animation: runBody 0.4s ease-in-out infinite;
        }

        @keyframes runBody {
            0%, 100% {
                transform: translateX(-50%) translateY(0) rotate(15deg);
            }
            50% {
                transform: translateX(-50%) translateY(-15px) rotate(15deg);
            }
        }

        .cuicui.run .leg.left {
            animation: runLegLeft 0.4s ease-in-out infinite;
        }

        .cuicui.run .leg.right {
            animation: runLegRight 0.4s ease-in-out infinite;
        }

        @keyframes runLegLeft {
            0%, 100% { transform: rotate(-40deg); }
            50% { transform: rotate(40deg); }
        }

        @keyframes runLegRight {
            0%, 100% { transform: rotate(40deg); }
            50% { transform: rotate(-40deg); }
        }

        .cuicui.run .arm.left {
            animation: runArmLeft 0.4s ease-in-out infinite;
        }

        .cuicui.run .arm.right {
            animation: runArmRight 0.4s ease-in-out infinite;
        }

        @keyframes runArmLeft {
            0%, 100% { transform: rotate(40deg); }
            50% { transform: rotate(-40deg); }
        }

        @keyframes runArmRight {
            0%, 100% { transform: rotate(-40deg); }
            50% { transform: rotate(40deg); }
        }

        /* 跑步尘土效果 */
        .dust {
            position: absolute;
            bottom: 70px;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 30px;
            opacity: 0;
        }

        .dust.show {
            opacity: 1;
        }

        .dust-particle {
            position: absolute;
            width: 10px;
            height: 10px;
            background: #D2691E;
            border-radius: 50%;
            animation: dustFly 0.6s ease-out infinite;
        }

        .dust-particle:nth-child(1) { left: 10px; animation-delay: 0s; }
        .dust-particle:nth-child(2) { left: 30px; animation-delay: 0.2s; }
        .dust-particle:nth-child(3) { left: 50px; animation-delay: 0.1s; }
        .dust-particle:nth-child(4) { left: 70px; animation-delay: 0.3s; }

        @keyframes dustFly {
            0% { transform: translateY(0) scale(1); opacity: 0.8; }
            100% { transform: translateY(-30px) scale(0); opacity: 0; }
        }

        /* 按钮区域 */
        .buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            padding: 0 20px;
            max-width: 700px;
        }

        .btn {
            padding: 12px 25px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-somersault { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
        .btn-pushup { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
        .btn-jump { background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%); }
        .btn-squat { background: linear-gradient(135deg, #fa709a 0%, #fee140 100%); }
        .btn-sad { background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%); color: #666; }
        .btn-happy { background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%); color: #d35400; }
        .btn-run { background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%); color: #c0392b; }
        .btn-stop { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    </style>
</head>
<body>
    <h1>🌟 翠翠的奇妙世界 🌟</h1>

    <div class="stage">
        <!-- 云朵装饰 -->
        <div class="cloud cloud1"></div>
        <div class="cloud cloud2"></div>

        <!-- 翠翠 -->
        <div class="cuicui" id="cuicui">
            <div class="bubble" id="bubble">😊</div>
            <div class="head">
                <img src="cuicui.jpg" alt="翠翠">
            </div>
            <div class="body"></div>
            <div class="arm left"></div>
            <div class="arm right"></div>
            <div class="leg left"></div>
            <div class="leg right"></div>
        </div>

        <!-- 跑步尘土 -->
        <div class="dust" id="dust">
            <div class="dust-particle"></div>
            <div class="dust-particle"></div>
            <div class="dust-particle"></div>
            <div class="dust-particle"></div>
        </div>
    </div>

    <!-- 按钮控制区 -->
    <div class="buttons">
        <button class="btn btn-somersault" onclick="doAction('somersault', '🤸')">翻跟头</button>
        <button class="btn btn-pushup" onclick="doAction('pushup', '💪')">俯卧撑</button>
        <button class="btn btn-jump" onclick="doAction('jump', '⬆️')">蹦高高</button>
        <button class="btn btn-squat" onclick="doAction('squat', '🧘')">蹲下</button>
        <button class="btn btn-sad" onclick="doAction('sad', '😢')">委屈</button>
        <button class="btn btn-happy" onclick="doAction('happy', '😄')">开心</button>
        <button class="btn btn-run" onclick="doAction('run', '🏃')">狂奔</button>
        <button class="btn btn-stop" onclick="stopAction()">停止</button>
    </div>

    <script>
        let currentAction = null;
        let actionInterval = null;

        function doAction(action, emoji) {
            const cuicui = document.getElementById('cuicui');
            const bubble = document.getElementById('bubble');
            const dust = document.getElementById('dust');

            // 清除之前的动作
            cuicui.className = 'cuicui';
            dust.classList.remove('show');

            if (actionInterval) {
                clearTimeout(actionInterval);
            }

            currentAction = action;

            // 显示表情
            bubble.textContent = emoji;
            bubble.classList.add('show');

            // 添加动作类
            cuicui.classList.add(action);

            // 狂奔时显示尘土
            if (action === 'run') {
                dust.classList.add('show');
            }

            // 翻跟头只播放一次
            if (action === 'somersault') {
                actionInterval = setTimeout(() => {
                    cuicui.classList.remove(action);
                    bubble.classList.remove('show');
                    currentAction = null;
                }, 1500);
            }

            // 蹲下保持姿势，其他循环播放
            if (action === 'squat') {
                // 蹲下保持
            }
        }

        function stopAction() {
            const cuicui = document.getElementById('cuicui');
            const bubble = document.getElementById('bubble');
            const dust = document.getElementById('dust');

            cuicui.className = 'cuicui';
            bubble.classList.remove('show');
            dust.classList.remove('show');

            if (actionInterval) {
                clearTimeout(actionInterval);
                actionInterval = null;
            }

            currentAction = null;
        }
    </script>
</body>
</html>
