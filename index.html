<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>认养一只翠翠</title>
  <style>
    :root {
      --panel-bg: rgba(255, 255, 255, 0.9);
      --panel-border: rgba(31, 68, 27, 0.14);
      --text-main: #19311b;
      --text-soft: #4d6650;
      --green-1: #bfe88d;
      --green-2: #84d662;
      --green-3: #4da944;
      --accent: #ff9d2e;
      --danger: #d65c5c;
      --shadow: rgba(17, 58, 20, 0.2);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text-main);
      background:
        radial-gradient(circle at top, rgba(255, 255, 255, 0.85), rgba(255, 255, 255, 0) 32%),
        linear-gradient(180deg, #8fd6ff 0%, #cbeeff 38%, #93d86f 38%, #6bc054 72%, #51a73f 100%);
      overflow-x: hidden;
      overflow-y: auto;
    }

    .app {
      min-height: 100vh;
      min-height: 100dvh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 14px;
      padding: 18px;
    }

    .topbar,
    .panel {
      width: min(1200px, 100%);
      margin: 0 auto;
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      border-radius: 22px;
      backdrop-filter: blur(12px);
      box-shadow: 0 18px 50px rgba(39, 97, 48, 0.13);
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 18px 20px;
      flex-wrap: wrap;
    }

    .title-wrap h1 {
      margin: 0;
      font-size: clamp(26px, 4vw, 40px);
      line-height: 1.1;
    }

    .title-wrap p {
      margin: 8px 0 0;
      color: var(--text-soft);
      font-size: 15px;
    }

    .stats {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      min-width: min(100%, 420px);
    }

    .stat-card {
      flex: 1 1 120px;
      min-width: 120px;
      padding: 12px 14px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.78);
      border: 1px solid rgba(30, 75, 22, 0.08);
    }

    .stat-card strong {
      display: block;
      font-size: 13px;
      color: var(--text-soft);
      margin-bottom: 8px;
      font-weight: 600;
    }

    .stat-card span {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: 0.02em;
    }

    .scene-shell {
      width: min(1200px, 100%);
      margin: 0 auto;
      min-height: 0;
    }

    .scene {
      position: relative;
      height: min(64vh, 720px);
      min-height: 420px;
      border-radius: 28px;
      overflow: hidden;
      cursor: crosshair;
      box-shadow: inset 0 -40px 120px rgba(13, 84, 25, 0.15), 0 22px 60px rgba(18, 68, 20, 0.2);
      background:
        radial-gradient(circle at 12% 18%, rgba(255, 255, 255, 0.82) 0 34px, rgba(255, 255, 255, 0) 35px),
        radial-gradient(circle at 20% 14%, rgba(255, 255, 255, 0.72) 0 26px, rgba(255, 255, 255, 0) 27px),
        radial-gradient(circle at 80% 16%, rgba(255, 255, 255, 0.76) 0 36px, rgba(255, 255, 255, 0) 37px),
        radial-gradient(circle at 88% 12%, rgba(255, 255, 255, 0.7) 0 24px, rgba(255, 255, 255, 0) 25px),
        linear-gradient(180deg, #8cd3ff 0%, #b6ebff 43%, #92dc6f 43%, #73c95c 76%, #4caa41 100%);
    }

    .scene::before,
    .scene::after {
      content: "";
      position: absolute;
      inset: auto auto 0 0;
      width: 120%;
      height: 40%;
      background: radial-gradient(circle at center, rgba(81, 165, 59, 0.7), rgba(81, 165, 59, 0));
      opacity: 0.65;
      pointer-events: none;
    }

    .scene::after {
      left: auto;
      right: -10%;
      bottom: 12%;
      width: 50%;
      height: 22%;
      opacity: 0.4;
    }

    .sun {
      position: absolute;
      top: 28px;
      right: 56px;
      width: 84px;
      height: 84px;
      border-radius: 50%;
      background: radial-gradient(circle, #ffe690 0%, #ffd35e 65%, #ffbf35 100%);
      box-shadow: 0 0 0 18px rgba(255, 223, 104, 0.18), 0 0 48px rgba(255, 198, 55, 0.45);
    }

    .hint,
    .bubble {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 16px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.84);
      border: 1px solid rgba(26, 66, 20, 0.1);
      backdrop-filter: blur(10px);
      text-align: center;
      box-shadow: 0 10px 30px rgba(23, 72, 32, 0.12);
      pointer-events: none;
    }

    .hint {
      top: 16px;
      font-size: 14px;
      color: var(--text-soft);
    }

    .bubble {
      top: 62px;
      font-size: 18px;
      font-weight: 700;
      opacity: 0;
      transition: opacity 0.24s ease;
      min-width: 180px;
    }

    .bubble.show {
      opacity: 1;
    }

    .flower {
      position: absolute;
      bottom: 18%;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #ffd2ec;
      box-shadow:
        -8px 0 0 #ffe6f5,
        8px 0 0 #ffe6f5,
        0 -8px 0 #ffc6e7,
        0 8px 0 #ffc6e7;
      opacity: 0.85;
    }

    .flower::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: 7px;
      height: 7px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: #ffd66a;
    }

    .cuicui {
      position: absolute;
      width: 188px;
      height: 260px;
      left: 100px;
      top: 170px;
      z-index: 3;
      transition-property: left, top;
      transition-timing-function: linear;
      transition-duration: 0ms;
      --dir: 1;
    }

    .shadow {
      position: absolute;
      left: 50%;
      bottom: 14px;
      width: 108px;
      height: 22px;
      border-radius: 50%;
      transform: translateX(-50%);
      background: rgba(21, 78, 20, 0.28);
      filter: blur(2px);
      transition: width 0.25s ease, opacity 0.25s ease;
    }

    .flip {
      position: absolute;
      inset: 0;
      transform: scaleX(var(--dir));
      transform-origin: center bottom;
    }

    .pose {
      position: absolute;
      left: 50%;
      bottom: 24px;
      width: 142px;
      height: 210px;
      transform: translateX(-50%);
      transform-origin: center bottom;
    }

    .head {
      position: absolute;
      top: 0;
      left: 50%;
      width: 94px;
      height: 94px;
      transform: translateX(-50%);
      border-radius: 50%;
      overflow: hidden;
      border: 5px solid rgba(255, 255, 255, 0.95);
      box-shadow: 0 10px 28px rgba(20, 57, 26, 0.28);
      background: #fff;
      z-index: 3;
    }

    .head img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .hair-tuft {
      position: absolute;
      top: -6px;
      left: 50%;
      width: 30px;
      height: 22px;
      transform: translateX(-50%) rotate(6deg);
      border-radius: 50% 50% 14px 14px;
      background: linear-gradient(180deg, #4a2f1d, #7b4d31);
      z-index: 1;
    }

    .body-shape {
      position: absolute;
      top: 74px;
      left: 50%;
      width: 88px;
      height: 94px;
      transform: translateX(-50%);
      border-radius: 40px 40px 34px 34px;
      background: linear-gradient(180deg, #ffd283 0%, #ffb84a 100%);
      box-shadow: inset 0 -10px 0 rgba(201, 122, 32, 0.2);
      z-index: 2;
    }

    .belly {
      position: absolute;
      left: 50%;
      top: 96px;
      width: 46px;
      height: 52px;
      transform: translateX(-50%);
      border-radius: 46% 46% 40% 40%;
      background: rgba(255, 244, 208, 0.85);
      z-index: 3;
    }

    .arm,
    .leg {
      position: absolute;
      border-radius: 999px;
      background: linear-gradient(180deg, #ffcb72 0%, #f0a842 100%);
      transform-origin: top center;
      z-index: 1;
    }

    .arm {
      top: 88px;
      width: 22px;
      height: 72px;
    }

    .arm.left {
      left: 20px;
      transform: rotate(16deg);
    }

    .arm.right {
      right: 20px;
      transform: rotate(-16deg);
    }

    .leg {
      top: 148px;
      width: 24px;
      height: 68px;
      z-index: 0;
    }

    .leg.left {
      left: 44px;
      transform: rotate(4deg);
    }

    .leg.right {
      right: 44px;
      transform: rotate(-4deg);
    }

    .foot {
      position: absolute;
      bottom: -3px;
      left: 50%;
      width: 34px;
      height: 12px;
      transform: translateX(-50%);
      border-radius: 999px;
      background: #c07a2b;
    }

    .action-prop {
      position: absolute;
      right: 8px;
      top: 28px;
      min-width: 54px;
      padding: 8px 10px;
      border-radius: 16px;
      border: 1px solid rgba(24, 62, 20, 0.1);
      background: rgba(255, 255, 255, 0.92);
      color: #234726;
      font-size: 14px;
      font-weight: 700;
      text-align: center;
      box-shadow: 0 12px 24px rgba(19, 68, 25, 0.14);
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.2s ease, transform 0.2s ease;
      pointer-events: none;
      z-index: 4;
    }

    .action-prop.show {
      opacity: 1;
      transform: translateY(0);
    }

    .status-line {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-bottom: 16px;
    }

    .status-badge {
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(123, 204, 94, 0.15);
      color: #255a28;
      font-size: 14px;
      font-weight: 700;
      border: 1px solid rgba(66, 126, 53, 0.12);
    }

    .status-text {
      font-size: 15px;
      color: var(--text-soft);
    }

    .panel {
      padding: 18px;
    }

    .actions {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
      gap: 12px;
    }

    button {
      appearance: none;
      border: 0;
      border-radius: 16px;
      padding: 13px 12px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(236, 251, 235, 0.95));
      color: var(--text-main);
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(43, 94, 36, 0.1);
      transition: transform 0.16s ease, box-shadow 0.16s ease, background 0.16s ease;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 30px rgba(43, 94, 36, 0.15);
      background: linear-gradient(180deg, rgba(255, 255, 255, 1), rgba(224, 248, 219, 1));
    }

    button:active {
      transform: translateY(0);
    }

    .btn-accent {
      background: linear-gradient(180deg, #fff2d8, #ffd891);
    }

    .btn-danger {
      background: linear-gradient(180deg, #ffe3e3, #ffc1c1);
      color: #7c2525;
    }

    .cuicui.is-moving .shadow {
      width: 96px;
      opacity: 0.78;
    }

    .cuicui.is-moving .pose {
      animation: walk-bounce 0.36s infinite alternate;
    }

    .cuicui.is-moving .arm.left,
    .cuicui.action-run .arm.left {
      animation: arm-swing-left 0.32s infinite alternate;
    }

    .cuicui.is-moving .arm.right,
    .cuicui.action-run .arm.right {
      animation: arm-swing-right 0.32s infinite alternate;
    }

    .cuicui.is-moving .leg.left,
    .cuicui.action-run .leg.left {
      animation: leg-swing-left 0.32s infinite alternate;
    }

    .cuicui.is-moving .leg.right,
    .cuicui.action-run .leg.right {
      animation: leg-swing-right 0.32s infinite alternate;
    }

    .cuicui.mood-happy .head {
      box-shadow: 0 10px 28px rgba(20, 57, 26, 0.28), 0 0 0 10px rgba(255, 225, 146, 0.22);
    }

    .cuicui.mood-happy .pose {
      transform: translateX(-50%) rotate(-4deg);
    }

    .cuicui.mood-sad .pose {
      transform: translateX(-50%) translateY(6px) rotate(6deg);
    }

    .cuicui.mood-sad .head img {
      filter: saturate(0.78) brightness(0.92);
    }

    .cuicui.mood-sad .body-shape {
      background: linear-gradient(180deg, #f6c979 0%, #d89a47 100%);
    }

    .cuicui.mood-grievance .pose {
      transform: translateX(-50%) translateY(4px) rotate(3deg);
    }

    .cuicui.mood-grievance .head {
      transform: translateX(-50%) rotate(-8deg);
    }

    .cuicui.action-jump .pose {
      animation: jump-hop 0.52s ease-in-out 3;
    }

    .cuicui.action-run .pose {
      animation: run-lean 0.22s infinite alternate;
    }

    .cuicui.action-pushup .pose {
      animation: push-up 0.62s ease-in-out 4;
    }

    .cuicui.action-slap .pose {
      animation: slap-shake 0.12s linear 8;
    }

    .cuicui.action-pet .pose {
      animation: cuddle 0.72s ease-in-out 2;
    }

    .cuicui.action-feed .head,
    .cuicui.action-water .head {
      animation: nibble 0.44s ease-in-out 3;
    }

    @keyframes walk-bounce {
      from { transform: translateX(-50%) translateY(0); }
      to { transform: translateX(-50%) translateY(-9px); }
    }

    @keyframes arm-swing-left {
      from { transform: rotate(26deg); }
      to { transform: rotate(-10deg); }
    }

    @keyframes arm-swing-right {
      from { transform: rotate(-26deg); }
      to { transform: rotate(10deg); }
    }

    @keyframes leg-swing-left {
      from { transform: rotate(12deg); }
      to { transform: rotate(-12deg); }
    }

    @keyframes leg-swing-right {
      from { transform: rotate(-12deg); }
      to { transform: rotate(12deg); }
    }

    @keyframes jump-hop {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      40% { transform: translateX(-50%) translateY(-64px); }
      55% { transform: translateX(-50%) translateY(-64px) scaleY(1.04); }
      75% { transform: translateX(-50%) translateY(0) scaleY(0.96); }
    }

    @keyframes run-lean {
      from { transform: translateX(-50%) translateY(-4px) rotate(4deg); }
      to { transform: translateX(-50%) translateY(3px) rotate(-3deg); }
    }

    @keyframes push-up {
      0%, 100% { transform: translateX(-50%) rotate(0deg) translateY(0); }
      20% { transform: translateX(-50%) rotate(-78deg) translateY(10px); }
      50% { transform: translateX(-50%) rotate(-78deg) translateY(32px); }
      80% { transform: translateX(-50%) rotate(-78deg) translateY(10px); }
    }

    @keyframes slap-shake {
      0%, 100% { transform: translateX(-50%) rotate(0deg); }
      25% { transform: translateX(-50%) rotate(8deg); }
      50% { transform: translateX(-50%) rotate(-8deg); }
      75% { transform: translateX(-50%) rotate(6deg); }
    }

    @keyframes cuddle {
      0%, 100% { transform: translateX(-50%) scale(1); }
      50% { transform: translateX(-50%) scale(1.08); }
    }

    @keyframes nibble {
      0%, 100% { transform: translateX(-50%) rotate(0deg); }
      25% { transform: translateX(-50%) rotate(6deg); }
      50% { transform: translateX(-50%) rotate(-4deg); }
      75% { transform: translateX(-50%) rotate(3deg); }
    }

    @media (max-width: 800px) {
      .app {
        padding: 12px;
        gap: 12px;
      }

      .topbar,
      .panel {
        border-radius: 18px;
      }

      .topbar {
        padding: 16px;
      }

      .title-wrap p {
        font-size: 14px;
        line-height: 1.5;
      }

      .stats {
        width: 100%;
        min-width: 0;
      }

      .stat-card {
        min-width: calc(50% - 6px);
      }

      .stat-card span {
        font-size: 22px;
      }

      .scene {
        height: 52vh;
        min-height: 340px;
        max-height: 520px;
        border-radius: 22px;
      }

      .sun {
        top: 20px;
        right: 20px;
        width: 64px;
        height: 64px;
        box-shadow: 0 0 0 14px rgba(255, 223, 104, 0.18), 0 0 36px rgba(255, 198, 55, 0.42);
      }

      .hint,
      .bubble {
        max-width: calc(100% - 24px);
        white-space: normal;
      }

      .hint {
        top: 12px;
        font-size: 13px;
        padding: 9px 12px;
      }

      .bubble {
        top: 52px;
        min-width: 0;
        font-size: 15px;
        line-height: 1.4;
        padding: 9px 14px;
      }

      .flower:nth-of-type(n + 6) {
        display: none;
      }

      .cuicui {
        width: 148px;
        height: 214px;
      }

      .shadow {
        width: 88px;
        height: 18px;
      }

      .pose {
        bottom: 20px;
        width: 116px;
        height: 174px;
      }

      .head {
        width: 78px;
        height: 78px;
        border-width: 4px;
      }

      .hair-tuft {
        top: -5px;
        width: 26px;
        height: 18px;
      }

      .body-shape {
        top: 62px;
        width: 74px;
        height: 80px;
      }

      .belly {
        top: 80px;
        width: 40px;
        height: 44px;
      }

      .arm {
        top: 74px;
        width: 18px;
        height: 58px;
      }

      .arm.left {
        left: 18px;
      }

      .arm.right {
        right: 18px;
      }

      .leg {
        top: 126px;
        width: 20px;
        height: 54px;
      }

      .leg.left {
        left: 38px;
      }

      .leg.right {
        right: 38px;
      }

      .foot {
        width: 28px;
        height: 10px;
      }

      .action-prop {
        right: 0;
        top: 20px;
        min-width: 46px;
        font-size: 12px;
        padding: 6px 8px;
      }

      .status-line {
        margin-bottom: 14px;
      }

      .status-badge,
      .status-text {
        font-size: 14px;
      }

      .panel {
        padding: 16px;
      }

      .actions {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      button {
        min-height: 44px;
        padding: 12px 10px;
        font-size: 14px;
      }
    }

    @media (max-width: 480px) {
      .app {
        padding: 10px;
      }

      .title-wrap h1 {
        font-size: 28px;
      }

      .topbar,
      .panel {
        border-radius: 16px;
      }

      .stat-card {
        min-width: 100%;
      }

      .scene {
        height: 46vh;
        min-height: 300px;
        max-height: 420px;
      }

      .sun {
        width: 54px;
        height: 54px;
      }

      .hint {
        font-size: 12px;
      }

      .bubble {
        top: 48px;
        font-size: 14px;
      }

      .cuicui {
        width: 132px;
        height: 196px;
      }

      .pose {
        width: 104px;
        height: 156px;
      }

      .head {
        width: 70px;
        height: 70px;
      }

      .body-shape {
        top: 56px;
        width: 66px;
        height: 72px;
      }

      .belly {
        top: 72px;
        width: 36px;
        height: 38px;
      }

      .arm {
        top: 68px;
        height: 50px;
      }

      .leg {
        top: 112px;
        height: 48px;
      }

      .leg.left {
        left: 33px;
      }

      .leg.right {
        right: 33px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="title-wrap">
        <h1>认养一只翠翠</h1>
        <p>点击或轻触草原上的任意位置，翠翠会自己走过去。下面按钮可以和她互动。</p>
      </div>
      <div class="stats">
        <div class="stat-card">
          <strong>亲密度</strong>
          <span id="loveValue">60</span>
        </div>
        <div class="stat-card">
          <strong>饱饱值</strong>
          <span id="foodValue">58</span>
        </div>
        <div class="stat-card">
          <strong>水润值</strong>
          <span id="waterValue">62</span>
        </div>
      </div>
    </header>

    <main class="scene-shell">
      <section class="scene" id="scene">
        <div class="sun"></div>
        <div class="hint">点草地移动翠翠</div>
        <div class="bubble" id="bubble">翠翠今天心情不错。</div>

        <div class="flower" style="left: 7%; bottom: 17%;"></div>
        <div class="flower" style="left: 15%; bottom: 25%;"></div>
        <div class="flower" style="left: 26%; bottom: 20%;"></div>
        <div class="flower" style="left: 42%; bottom: 14%;"></div>
        <div class="flower" style="left: 63%; bottom: 18%;"></div>
        <div class="flower" style="left: 74%; bottom: 24%;"></div>
        <div class="flower" style="left: 88%; bottom: 19%;"></div>

        <div class="cuicui mood-happy" id="cuicui">
          <div class="shadow"></div>
          <div class="flip">
            <div class="pose">
              <div class="hair-tuft"></div>
              <div class="head">
                <img src="./cuicui.jpg" alt="翠翠头像" />
              </div>
              <div class="arm left"></div>
              <div class="arm right"></div>
              <div class="body-shape"></div>
              <div class="belly"></div>
              <div class="leg left"><div class="foot"></div></div>
              <div class="leg right"><div class="foot"></div></div>
            </div>
          </div>
          <div class="action-prop" id="actionProp"></div>
        </div>
      </section>
    </main>

    <section class="panel">
      <div class="status-line">
        <div class="status-badge" id="moodBadge">当前状态：开心</div>
        <div class="status-text" id="statusText">翠翠正在晒太阳，随时等你互动。</div>
      </div>
      <div class="actions">
        <button data-action="happy">开心</button>
        <button data-action="sad">伤心</button>
        <button data-action="grievance">委屈</button>
        <button data-action="jump" class="btn-accent">蹦高高</button>
        <button data-action="run" class="btn-accent">奔跑</button>
        <button data-action="pushup">俯卧撑</button>
        <button data-action="feed">投喂食物</button>
        <button data-action="water">喂水</button>
        <button data-action="slap" class="btn-danger">抽耳光</button>
        <button data-action="pet">爱的抚摸</button>
      </div>
    </section>
  </div>

  <script>
    const scene = document.getElementById('scene');
    const cuicui = document.getElementById('cuicui');
    const bubble = document.getElementById('bubble');
    const actionProp = document.getElementById('actionProp');
    const moodBadge = document.getElementById('moodBadge');
    const statusText = document.getElementById('statusText');
    const loveValue = document.getElementById('loveValue');
    const foodValue = document.getElementById('foodValue');
    const waterValue = document.getElementById('waterValue');

    const state = {
      mood: 'happy',
      action: '',
      love: 60,
      food: 58,
      water: 62,
      x: 100,
      y: 170,
      moving: false,
      actionTimer: null,
      bubbleTimer: null,
      propTimer: null,
      moveToken: 0,
    };

    const moodTextMap = {
      happy: '开心',
      sad: '伤心',
      grievance: '委屈',
    };

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function setBubble(text, duration = 1600) {
      bubble.textContent = text;
      bubble.classList.add('show');
      clearTimeout(state.bubbleTimer);
      state.bubbleTimer = setTimeout(() => {
        bubble.classList.remove('show');
      }, duration);
    }

    function showProp(text, duration = 1200) {
      actionProp.textContent = text;
      actionProp.classList.add('show');
      clearTimeout(state.propTimer);
      state.propTimer = setTimeout(() => {
        actionProp.classList.remove('show');
      }, duration);
    }

    function renderStats() {
      loveValue.textContent = state.love;
      foodValue.textContent = state.food;
      waterValue.textContent = state.water;
    }

    function renderMood() {
      cuicui.classList.remove('mood-happy', 'mood-sad', 'mood-grievance');
      cuicui.classList.add(`mood-${state.mood}`);
      moodBadge.textContent = `当前状态：${moodTextMap[state.mood] || '开心'}`;
    }

    function setMood(mood, text) {
      state.mood = mood;
      renderMood();
      statusText.textContent = text;
      setBubble(text, 1800);
    }

    function clearAction() {
      if (!state.action) return;
      cuicui.classList.remove(
        'action-jump',
        'action-run',
        'action-pushup',
        'action-feed',
        'action-water',
        'action-slap',
        'action-pet'
      );
      state.action = '';
    }

    function setAction(actionClass, duration) {
      clearTimeout(state.actionTimer);
      clearAction();
      if (!actionClass) return;
      state.action = actionClass;
      cuicui.classList.add(`action-${actionClass}`);
      state.actionTimer = setTimeout(() => {
        if (state.action === actionClass) {
          clearAction();
        }
      }, duration);
    }

    function faceTo(targetX) {
      cuicui.style.setProperty('--dir', targetX >= state.x ? '1' : '-1');
    }

    function getCuicuiBounds() {
      const rect = scene.getBoundingClientRect();
      const cuicuiWidth = cuicui.offsetWidth || 188;
      const cuicuiHeight = cuicui.offsetHeight || 260;
      const maxX = Math.max(18, rect.width - cuicuiWidth - 18);
      const maxY = Math.max(120, rect.height - cuicuiHeight - 10);
      const minY = Math.min(maxY, Math.max(72, rect.height * 0.28));
      return { rect, cuicuiWidth, cuicuiHeight, maxX, maxY, minY };
    }

    function moveTo(targetX, targetY, speed = 260, note = '翠翠正慢悠悠走过去。') {
      const dx = targetX - state.x;
      const dy = targetY - state.y;
      const distance = Math.hypot(dx, dy);
      const duration = Math.max(320, Math.round((distance / speed) * 1000));
      const token = ++state.moveToken;

      faceTo(targetX);
      state.moving = true;
      cuicui.classList.add('is-moving');
      cuicui.style.transitionDuration = `${duration}ms`;
      cuicui.style.left = `${targetX}px`;
      cuicui.style.top = `${targetY}px`;
      state.x = targetX;
      state.y = targetY;
      statusText.textContent = note;

      window.setTimeout(() => {
        if (state.moveToken !== token) return;
        state.moving = false;
        cuicui.classList.remove('is-moving');
        if (state.action === 'run') {
          clearAction();
        }
        statusText.textContent = `翠翠已经走到这里了，${moodTextMap[state.mood]}地看着你。`;
      }, duration + 30);
    }

    function randomWalkByRun() {
      const { maxX, maxY, minY } = getCuicuiBounds();
      const offset = Math.random() > 0.5 ? 180 : -180;
      const targetX = clamp(state.x + offset, 18, maxX);
      const targetY = clamp(state.y + (Math.random() * 60 - 30), minY, maxY);
      moveTo(targetX, targetY, 480, '翠翠突然撒欢奔跑起来了。');
    }

    function changeValue(key, delta) {
      state[key] = clamp(state[key] + delta, 0, 100);
      renderStats();
    }

    function performAction(action) {
      if (action === 'happy') {
        changeValue('love', 6);
        setMood('happy', '翠翠乐开了花，摇头晃脑地冲你笑。');
        return;
      }

      if (action === 'sad') {
        changeValue('love', -4);
        setMood('sad', '翠翠低下脑袋，像是有点失落。');
        return;
      }

      if (action === 'grievance') {
        changeValue('love', -2);
        setMood('grievance', '翠翠扁着嘴看你，一副很委屈的样子。');
        return;
      }

      if (action === 'jump') {
        setAction('jump', 1700);
        changeValue('love', 4);
        setMood('happy', '翠翠原地蹦高高，开心得停不下来。');
        return;
      }

      if (action === 'run') {
        setAction('run', 2400);
        changeValue('food', -4);
        changeValue('water', -3);
        setMood('happy', '翠翠开启大草原冲刺模式。');
        randomWalkByRun();
        return;
      }

      if (action === 'pushup') {
        setAction('pushup', 2500);
        changeValue('food', -6);
        changeValue('water', -4);
        changeValue('love', 2);
        setMood('happy', '翠翠认真做起了俯卧撑，练得很投入。');
        return;
      }

      if (action === 'feed') {
        setAction('feed', 1600);
        showProp('食物');
        changeValue('food', 14);
        changeValue('love', 5);
        setMood('happy', '翠翠大口吃起了你投喂的食物。');
        return;
      }

      if (action === 'water') {
        setAction('water', 1600);
        showProp('水');
        changeValue('water', 16);
        changeValue('love', 3);
        setMood('happy', '翠翠喝到了水，整只都精神了。');
        return;
      }

      if (action === 'slap') {
        setAction('slap', 1000);
        changeValue('love', -14);
        setMood('sad', '翠翠被打懵了，委委屈屈地躲开一点。');
        const { maxX } = getCuicuiBounds();
        const targetX = clamp(state.x + 60, 18, maxX);
        moveTo(targetX, state.y, 340, '翠翠捂着脑袋往旁边躲。');
        return;
      }

      if (action === 'pet') {
        setAction('pet', 1600);
        changeValue('love', 12);
        setMood('happy', '翠翠被你摸得眯起眼睛，靠过来撒娇。');
      }
    }

    scene.addEventListener('click', (event) => {
      const { rect, cuicuiWidth, cuicuiHeight, maxX, maxY, minY } = getCuicuiBounds();
      const targetX = clamp(event.clientX - rect.left - cuicuiWidth / 2, 18, maxX);
      const targetY = clamp(event.clientY - rect.top - cuicuiHeight * 0.7, minY, maxY);
      moveTo(targetX, targetY, state.action === 'run' ? 480 : 260, '翠翠收到你的指令，正穿过草原走来。');
      setBubble('收到，翠翠这就过去。');
    });

    document.querySelector('.actions').addEventListener('click', (event) => {
      const button = event.target.closest('button[data-action]');
      if (!button) return;
      performAction(button.dataset.action);
    });

    window.addEventListener('resize', () => {
      const { maxX, maxY, minY } = getCuicuiBounds();
      state.x = clamp(state.x, 18, maxX);
      state.y = clamp(state.y, minY, maxY);
      cuicui.style.left = `${state.x}px`;
      cuicui.style.top = `${state.y}px`;
    });

    function init() {
      renderStats();
      renderMood();
      const { maxX, maxY, minY } = getCuicuiBounds();
      state.x = clamp(state.x, 18, maxX);
      state.y = clamp(state.y, minY, maxY);
      cuicui.style.left = `${state.x}px`;
      cuicui.style.top = `${state.y}px`;
      cuicui.style.setProperty('--dir', '1');
      setBubble('翠翠已经在草原上等你了。', 2200);
    }

    init();
  </script>
</body>
</html>
